<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ELZER Admin</title>
<link rel="manifest" href="manifest-admin.json"/>
<meta name="theme-color" content="#0f2d0a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Admin ELZER"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
</head>
<body style="margin:0;padding:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f0f4ec;padding:20px;box-sizing:border-box;font-family:Arial,sans-serif;">
<div style="width:100%;max-width:380px;">
  <!-- Logo ELZER -->
  <div style="background:linear-gradient(160deg,#0f2d0a 0%,#1a4d10 60%,#2d6a1f 100%);border-radius:16px;padding:36px 20px;text-align:center;margin-bottom:16px;box-shadow:0 8px 32px rgba(15,45,10,.3);">
    <div style="display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);border-radius:14px;padding:14px 24px;border:1px solid rgba(255,255,255,.2);margin-bottom:14px;">
      <div>
        <div style="font-size:38px;font-weight:700;color:#e67e22;letter-spacing:4px;line-height:1;">ELZER</div>
        <div style="font-size:10px;color:#6cb84a;letter-spacing:4px;text-transform:uppercase;margin-top:4px;">Distribution</div>
      </div>
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,.6);margin-bottom:3px;">Marrakech &middot; Fruits &amp; L&eacute;gumes</div>
    <div style="font-size:10px;color:rgba(255,255,255,.35);">RC:52057 &middot; ICE:000073472000003</div>
  </div>
  <!-- Formulaire -->
  <div style="background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);">
    <div style="font-size:13px;font-weight:500;color:#666;text-align:center;margin-bottom:16px;">Administration &mdash; Acc&egrave;s r&eacute;serv&eacute;</div>
    <input type="password" id="pwd" placeholder="Mot de passe" style="width:100%;padding:12px 16px;font-size:14px;border-radius:8px;border:1.5px solid #e0e8d8;box-sizing:border-box;margin-bottom:10px;outline:none;" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button onclick="doLogin()" style="width:100%;padding:13px;background:#2d6a1f;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;">Connexion</button>
    <div id="err" style="color:#d32f2f;font-size:12px;text-align:center;margin-top:8px;display:none;">Mot de passe incorrect</div>
  </div>
</div>
<script>
function doLogin(){
  var pwd=document.getElementById('pwd').value;
  var saved=localStorage.getItem('admin_password')||'elzer2026';
  if(pwd===saved){
    sessionStorage.setItem('elzer-admin-ok','1');
    window.location.replace('admin.html');
  } else {
    document.getElementById('err').style.display='block';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}
// Si deja connecte, aller directement
if(sessionStorage.getItem('elzer-admin-ok')==='1'){
  window.location.replace('admin.html');
}
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
</body>
</html>
