<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ELZER Admin</title>
<link rel="manifest" href="manifest-admin.json"/>
<meta name="theme-color" content="#0f2d0a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Admin ELZER"/>
</head>
<body style="margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f4ec;padding:20px;box-sizing:border-box;font-family:Arial,sans-serif;">
<div style="width:100%;max-width:380px;">
  <div style="background:linear-gradient(160deg,#0f2d0a 0%,#1a4d10 60%,#2d6a1f 100%);border-radius:16px;padding:36px 20px;text-align:center;margin-bottom:16px;">
    <div style="display:inline-flex;background:rgba(255,255,255,.1);border-radius:14px;padding:14px 24px;border:1px solid rgba(255,255,255,.2);margin-bottom:14px;">
      <div>
        <svg viewBox="0 0 280 65" width="220" height="55" role="img">
          <title>ELZER Distribution</title>
          <g transform="translate(0,3)">
            <circle cx="28" cy="28" r="26" fill="#2d6a1f"/>
            <path d="M28 9 C17 15 13 24 17 33 C21 41 26 45 28 47 C30 45 35 41 39 33 C43 24 39 15 28 9Z" fill="#6cb84a"/>
            <path d="M28 9 C39 15 43 24 39 33 C35 41 30 45 28 47Z" fill="#4a9a35"/>
            <path d="M23 41 L26 48 L28 41Z" fill="#e67e22"/>
            <path d="M33 41 L30 48 L28 41Z" fill="#e67e22" opacity=".7"/>
            <line x1="28" y1="9" x2="28" y2="5" stroke="#854f0b" stroke-width="2" stroke-linecap="round"/>
            <path d="M28 6 C31 3 34 4 32 7 C30 9 28 8 28 6Z" fill="#6cb84a"/>
          </g>
          <text x="64" y="28" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#e67e22" letter-spacing="3">ELZER</text>
          <line x1="64" y1="34" x2="260" y2="34" stroke="#6cb84a" stroke-width="0.8" opacity="0.5"/>
          <text x="64" y="47" font-family="Arial,sans-serif" font-size="9" fill="#a0c878" letter-spacing="3">DISTRIBUTION - MARRAKECH</text>
        </svg>
      </div>
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,.6);margin-bottom:3px;">Marrakech - Fruits et Legumes</div>
    <div style="font-size:10px;color:rgba(255,255,255,.35);">RC:52057 - ICE:000073472000003</div>
  </div>
  <div style="background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);">
    <div style="font-size:13px;font-weight:500;color:#666;text-align:center;margin-bottom:16px;">Administration - Acces reserve</div>
    <input type="password" id="pwd" placeholder="Mot de passe" autocomplete="off" style="width:100%;padding:12px 16px;font-size:14px;border-radius:8px;border:1.5px solid #e0e8d8;box-sizing:border-box;margin-bottom:10px;outline:none;" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button id="login-btn" onclick="doLogin()" style="width:100%;padding:13px;background:#2d6a1f;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;">Connexion</button>
    <div id="err" style="color:#d32f2f;font-size:12px;text-align:center;margin-top:8px;display:none;">Mot de passe incorrect</div>
  </div>
</div>
<script src="elzer-crypto.js"></script>
<script>
// ===== Parametres de securite login =====
var MAX_TENTATIVES = 5;          // #4 : nb d'echecs avant verrouillage
var LOCK_MINUTES = 15;           // #4 : duree du verrouillage
var LOCK_MS = LOCK_MINUTES*60*1000;

function readStoredPwd(){
  var raw = localStorage.getItem('admin_password');
  if(raw===null || raw===undefined) return 'elzer2026';
  try{
    var parsed = JSON.parse(raw);
    if(typeof parsed==='string') return parsed;
  }catch(e){}
  return raw;
}

// ---- Gestion de l'etat de verrouillage (persistant en localStorage) ----
function getLockState(){
  try{
    var s = JSON.parse(localStorage.getItem('elzer_login_lock')||'{}');
    return { fails: s.fails||0, until: s.until||0 };
  }catch(e){ return { fails:0, until:0 }; }
}
function setLockState(st){
  try{ localStorage.setItem('elzer_login_lock', JSON.stringify(st)); }catch(e){}
}
function resetLockState(){
  try{ localStorage.removeItem('elzer_login_lock'); }catch(e){}
}
function isLocked(){
  var st = getLockState();
  return st.until && Date.now() < st.until;
}

function showErr(msg){
  var el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideErr(){ document.getElementById('err').style.display='none'; }

function setFormDisabled(disabled){
  document.getElementById('pwd').disabled = disabled;
  document.getElementById('login-btn').disabled = disabled;
  document.getElementById('login-btn').style.opacity = disabled ? '0.5' : '1';
  document.getElementById('login-btn').style.cursor = disabled ? 'not-allowed' : 'pointer';
}

// Affiche le compte a rebours pendant un verrouillage
var lockInterval = null;
function startLockCountdown(){
  setFormDisabled(true);
  if(lockInterval) clearInterval(lockInterval);
  function tick(){
    var st = getLockState();
    var remain = st.until - Date.now();
    if(remain <= 0){
      clearInterval(lockInterval); lockInterval=null;
      resetLockState();
      setFormDisabled(false);
      hideErr();
      return;
    }
    var min = Math.floor(remain/60000);
    var sec = Math.floor((remain%60000)/1000);
    showErr('🔒 Trop de tentatives. Réessayez dans '+min+':'+(sec<10?'0':'')+sec);
  }
  tick();
  lockInterval = setInterval(tick, 1000);
}

var loginBusy = false;
function doLogin(){
  if(loginBusy) return;
  if(isLocked()){ startLockCountdown(); return; }

  var v=document.getElementById('pwd').value;
  var stored=readStoredPwd();
  loginBusy = true;
  setFormDisabled(true);

  ElzerCrypto.verifyPassword(v, stored).then(function(res){
    if(res.ok){
      resetLockState();
      if(res.needsUpgrade){
        ElzerCrypto.hashPassword(v).then(function(h){
          try{ localStorage.setItem('admin_password', JSON.stringify(h)); }catch(e){}
          sessionStorage.setItem('elzer-admin-ok','1');
          window.location.href='admin.html';
        });
      } else {
        sessionStorage.setItem('elzer-admin-ok','1');
        window.location.href='admin.html';
      }
      return;
    }

    // Echec : incrementer le compteur
    var st = getLockState();
    st.fails = (st.fails||0) + 1;
    document.getElementById('pwd').value='';

    if(st.fails >= MAX_TENTATIVES){
      // #4 : verrouillage
      st.until = Date.now() + LOCK_MS;
      setLockState(st);
      startLockCountdown();
      loginBusy = false;
      return;
    }
    setLockState(st);

    // #12 : delai progressif apres echec (1s, 2s, 3s...)
    var restantes = MAX_TENTATIVES - st.fails;
    var delaiSec = st.fails; // 1s au 1er echec, 2s au 2e...
    showErr('❌ Mot de passe incorrect. '+restantes+' tentative'+(restantes>1?'s':'')+' restante'+(restantes>1?'s':'')+'.');
    setTimeout(function(){
      setFormDisabled(false);
      loginBusy = false;
      hideErr();
      document.getElementById('pwd').focus();
    }, delaiSec*1000);
  });
}

// Au chargement : si deja verrouille, afficher le compte a rebours
if(isLocked()){ startLockCountdown(); }

if(sessionStorage.getItem('elzer-admin-ok')==='1'){
  window.location.href='admin.html';
}
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
</body>
</html>
