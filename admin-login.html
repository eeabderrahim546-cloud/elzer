<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ELZER Admin</title>
<link rel="manifest" href="manifest-admin.json"/>
<meta name="theme-color" content="#0f2d0a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Admin ELZER"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f2d0a;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;}
.card{background:#fff;border-radius:16px;padding:36px 28px;width:300px;text-align:center;}
.logo{font-size:26px;font-weight:700;color:#e67e22;}
.sub{font-size:9px;color:#2d6a1f;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;margin-top:2px;}
input{width:100%;padding:13px;border:1.5px solid #e0e8d8;border-radius:8px;font-size:15px;outline:none;text-align:center;margin-bottom:12px;font-family:Arial,sans-serif;}
input:focus{border-color:#2d6a1f;}
button{width:100%;padding:13px;background:#2d6a1f;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-family:Arial,sans-serif;}
button:active{opacity:0.9;}
.err{color:#d32f2f;font-size:12px;margin-top:8px;display:none;}
.hint{font-size:10px;color:#bbb;margin-top:16px;}
</style>
</head>
<body>
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f0f4ec;padding:20px;box-sizing:border-box;">
  <div style="width:100%;max-width:380px;">
    <!-- Logo ELZER -->
    <div style="background:linear-gradient(160deg,#0f2d0a 0%,#1a4d10 60%,#2d6a1f 100%);border-radius:16px;padding:36px 20px;text-align:center;margin-bottom:16px;box-shadow:0 8px 32px rgba(15,45,10,.3);">
      <div style="display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);border-radius:14px;padding:14px 24px;border:1px solid rgba(255,255,255,.2);margin-bottom:14px;">
        <div>
          <div style="font-size:38px;font-weight:700;color:#e67e22;letter-spacing:4px;line-height:1;font-family:Arial,sans-serif;">ELZER</div>
          <div style="font-size:10px;color:#6cb84a;letter-spacing:4px;text-transform:uppercase;margin-top:4px;font-family:Arial,sans-serif;">Distribution</div>
        </div>
      </div>
      <div style="font-size:12px;color:rgba(255,255,255,.6);margin-bottom:3px;font-family:Arial,sans-serif;">Marrakech · Fruits &amp; Légumes</div>
      <div style="font-size:10px;color:rgba(255,255,255,.35);font-family:Arial,sans-serif;">RC:52057 · ICE:000073472000003</div>
    </div>
    <!-- Formulaire -->
    <div style="background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);">
      <div style="font-size:13px;font-weight:500;color:#666;text-align:center;margin-bottom:16px;font-family:Arial,sans-serif;">Administration — Accès réservé</div>
      <input type="password" id="pwd" placeholder="Mot de passe" style="width:100%;padding:12px 16px;font-size:14px;border-radius:8px;border:1.5px solid #e0e8d8;box-sizing:border-box;margin-bottom:10px;font-family:Arial,sans-serif;outline:none;" onkeydown="if(event.key==='Enter')login()"/>
      <button onclick="login()" style="width:100%;padding:13px;background:#2d6a1f;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:Arial,sans-serif;">Connexion</button>
      <div id="err" style="color:#d32f2f;font-size:12px;text-align:center;margin-top:8px;display:none;">Mot de passe incorrect</div>
    </div>
  </div>
</div>
</html>
