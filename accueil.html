<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ELZER Distribution</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0f2d0a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="ELZER"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",Arial,sans-serif;background:#0f2d0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.wrap{width:100%;max-width:380px;}
.logo-wrap{text-align:center;margin-bottom:32px;}
.logo-img{background:white;border-radius:14px;padding:10px 20px;height:70px;object-fit:contain;box-shadow:0 8px 30px rgba(0,0,0,.3);}
.logo-sub{font-size:12px;color:#6cb84a;letter-spacing:1.5px;text-transform:uppercase;margin-top:12px;}
.logo-slogan{font-size:11px;color:rgba(255,255,255,.35);margin-top:4px;}
#btn-install{display:none;width:100%;padding:13px;background:#e67e22;color:white;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;}
#btn-install.show{display:block;}
.cards{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;text-decoration:none;transition:background .2s;}
.card:hover{background:rgba(255,255,255,.12);}
.card-ico{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.card-ico.g{background:#2d6a1f;}
.card-ico.d{background:rgba(255,255,255,.1);}
.card-text{flex:1;}
.card-title{font-size:15px;font-weight:600;color:white;margin-bottom:2px;}
.card-desc{font-size:12px;color:rgba(255,255,255,.45);}
.card-arr{font-size:18px;color:rgba(255,255,255,.25);}
.coords{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 16px;font-size:10px;color:rgba(255,255,255,.35);line-height:1.9;text-align:center;}
.coords a{color:#6cb84a;text-decoration:none;}
</style>
</head>
